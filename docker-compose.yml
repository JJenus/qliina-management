version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: laundry-postgres
    environment:
      POSTGRES_DB: laundry_db
      POSTGRES_USER: laundry_user
      POSTGRES_PASSWORD: laundry_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - laundry-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laundry_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: laundry-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/laundry_db
      SPRING_DATASOURCE_USERNAME: laundry_user
      SPRING_DATASOURCE_PASSWORD: laundry_pass
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8080:8080"
    networks:
      - laundry-network

volumes:
  postgres-data:

networks:
  laundry-network:
    driver: bridge
