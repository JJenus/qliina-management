spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0

logging:
  level:
    com.jjenus.qliina_management: INFO
    org.springframework: WARN

server:
  port: ${PORT:8080}

encryption:
  secret: ${ENCRYPTION_SECRET:tWHKe8dL9FTumZynTVF8UDYruDUiODdOh0WWLt7fY0I=}
  salt: ${ENCRYPTION_SALT:f14ecc5ca42ba522a1f5a38df1564282}
  iteration-count: 65536
  key-length: 256
  enabled: true