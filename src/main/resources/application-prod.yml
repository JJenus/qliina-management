spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.jjenus.qliina_management: INFO
    org.springframework: WARN

server:
  port: ${PORT:8080}
